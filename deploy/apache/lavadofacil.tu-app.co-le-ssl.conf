# LavadoFácil — vhost HTTPS (puerto 443)
# Path-based tenancy: un solo dominio, certificado normal Let's Encrypt.
# Generalmente este archivo lo crea automáticamente certbot al correr:
#   sudo certbot --apache -d lavadofacil.tu-app.co
# Lo dejamos en el repo como referencia/respaldo.

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName lavadofacil.tu-app.co
    DocumentRoot /var/www/lavadofacil/public

    <Directory /var/www/lavadofacil/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/lavadofacil-error.log
    CustomLog ${APACHE_LOG_DIR}/lavadofacil-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/lavadofacil.tu-app.co/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/lavadofacil.tu-app.co/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
