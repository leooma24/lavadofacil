# LavadoFácil — vhost HTTP (puerto 80)
# Path-based tenancy: un solo dominio sirve TODO (landing, /central, /{slug}, /{slug}/admin).
# Sin wildcard, sin subdomains. SSL normal Let's Encrypt vía HTTP-01 challenge.
#
# Instalar:
#   sudo cp deploy/apache/lavadofacil.tu-app.co.conf /etc/apache2/sites-available/
#   sudo a2ensite lavadofacil.tu-app.co.conf
#   sudo systemctl reload apache2
#   sudo certbot --apache -d lavadofacil.tu-app.co

<VirtualHost *:80>
    ServerName lavadofacil.tu-app.co
    DocumentRoot /var/www/lavadofacil/public

    <Directory /var/www/lavadofacil/public>
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine on
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
